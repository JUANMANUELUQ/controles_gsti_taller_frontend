<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Usuario - Portal</title>
    <style>
        :root {
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-surface: #FEF7FF;
            --md-sys-color-on-surface: #1D1B20;
            --md-sys-color-outline: #79747E;
            --md-sys-color-background: #F4F3F7;
            --font-family: 'Roboto', 'Segoe UI', system-ui, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-family); background: var(--md-sys-color-background); display: flex; align-items: center; justify-content: center; height: 100vh; padding: 1rem; }
        .card { background: var(--md-sys-color-surface); padding: 1.75rem; border-radius: 16px; width: 100%; max-width: 420px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        h1 { font-size: 1.25rem; color: var(--md-sys-color-primary); margin-bottom: 0.5rem; }
        p.subtitle { color: var(--md-sys-color-outline); margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display:block; font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--md-sys-color-on-surface); font-weight: 500; }
        input { width: 100%; padding: 0.7rem 0.9rem; border: 1px solid var(--md-sys-color-outline); border-radius: 8px; font-size: 1rem; }
        .row { display:flex; gap: 0.5rem; align-items:center; }
        .btn-primary { background-color: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); border: none; padding: 0.65rem 1rem; border-radius: 12px; cursor: pointer; font-weight: 500; }
        .btn-secondary { background: transparent; border: 1px solid var(--md-sys-color-outline); padding: 0.55rem 0.85rem; border-radius: 12px; cursor: pointer; }
        .actions { display:flex; gap:0.5rem; justify-content: flex-end; margin-top: 0.5rem; }
        .message { margin-top: 0.75rem; font-size: 0.9rem; color: var(--md-sys-color-outline); }
        .error { color: #ba1a1a; }
        .success { color: #0b7548; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Registrar Usuario</h1>
        <p class="subtitle">Solo administradores pueden registrar nuevos usuarios.</p>

        <form id="registerForm">
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input id="nombre" name="nombre" type="text" placeholder="Ej: SANTIAGO" required />
            </div>

            <div class="form-group">
                <label for="clave">Contraseña</label>
                <input id="clave" name="clave" type="password" placeholder="Ej: ABCD1234" required />
            </div>

            <div class="actions">
                <button type="button" id="backBtn" class="btn-secondary">Volver</button>
                <button type="submit" id="submitBtn" class="btn-primary">Registrar</button>
            </div>

            <div id="message" class="message" aria-live="polite"></div>
        </form>
    </div>

    <script>
        // Verificar token ADMIN antes de permitir acceso a la página
        (function() {
            function parseJwt(token) {
                try {
                    const base64Url = token.split('.')[1];
                    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));
                    return JSON.parse(jsonPayload);
                } catch (e) { return null; }
            }

            function getValidPayload() {
                const token = sessionStorage.getItem('token') || localStorage.getItem('token');
                if (!token) return null;
                const payload = parseJwt(token);
                if (!payload) return null;
                if (payload.exp) {
                    const now = Math.floor(Date.now() / 1000);
                    if (payload.exp <= now) return null;
                }
                return payload;
            }

            const payload = getValidPayload();
            if (!payload) { window.location.href = 'login.html'; return; }
            const roleRaw = payload.rol || payload.role || payload.Rol || payload.ROL || '';
            const role = String(roleRaw).toUpperCase();
            if (!role.includes('ADMIN')) { sessionStorage.removeItem('token'); localStorage.removeItem('token'); window.location.href = 'login.html'; return; }
        })();

        const form = document.getElementById('registerForm');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const backBtn = document.getElementById('backBtn');

        backBtn.addEventListener('click', function() { window.location.href = 'admin.html'; });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + (type === 'error' ? 'error' : 'success');
        }

        async function registerUser(nombre, clave) {
            const url = 'http://localhost:8080/api/public/register';
            const token = sessionStorage.getItem('token') || localStorage.getItem('token');

            const body = { nombre: nombre, clave: clave };

            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = 'Bearer ' + token;

            const resp = await fetch(url, { method: 'POST', headers: headers, body: JSON.stringify(body) });
            return resp;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            showMessage('', '');

            const nombre = document.getElementById('nombre').value.trim();
            const clave = document.getElementById('clave').value.trim();

            if (!nombre || !clave) { showMessage('Completa ambos campos.', 'error'); return; }

            const payloadNombre = nombre.toUpperCase();
            const payloadClave = clave.toUpperCase();

            submitBtn.disabled = true;
            try {
                const resp = await registerUser(payloadNombre, payloadClave);
                if (!resp.ok) {
                    const text = await resp.text().catch(() => 'Error en la solicitud');
                    showMessage('Error: ' + resp.status + ' - ' + text, 'error');
                    submitBtn.disabled = false;
                    return;
                }

                const data = await resp.json().catch(() => null);
                showMessage('Usuario registrado correctamente.', 'success');
                form.reset();
                submitBtn.disabled = false;
            } catch (err) {
                showMessage('No se pudo conectar al servidor.', 'error');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
