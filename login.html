<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LogiTech Solución</title>
    <style>
        :root {
            --md-sys-color-primary: #00639b;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-surface: #fcfcff;
            --md-sys-color-on-surface: #1a1c1e;
            --md-sys-color-outline: #74777f;
            --md-sys-color-error: #ba1a1a;
            --font-family: 'Roboto', 'Segoe UI', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-card {
            background-color: var(--md-sys-color-surface);
            padding: 2.5rem;
            border-radius: 28px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        header img {
            width: 64px;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--md-sys-color-on-surface);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        p {
            color: var(--md-sys-color-outline);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--md-sys-color-on-surface);
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--md-sys-color-primary);
            border-width: 2px;
        }

        .error-message {
            color: var(--md-sys-color-error);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none; /* Oculto por defecto */
        }

        .btn-login {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            padding: 0.8rem;
            width: 100%;
            border-radius: 100px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .footer-note {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--md-sys-color-outline);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <header>
            <h1>Bienvenido</h1>
            <p>Ingresa tus credenciales para continuar</p>
        </header>

        <form id="loginForm">
            <div id="errorMessage" class="error-message">
                Usuario o contraseña incorrectos.
            </div>

            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" placeholder="Ej: admin123" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>

        <div class="footer-note">
            LogiTech Solución © 2026
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMessage');
        const submitButton = form.querySelector('button[type="submit"]');

        // Decodifica el payload de un JWT (maneja base64url)
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (e) {
                return null;
            }
        }

        async function sendLoginRequest(nombre, clave) {
            const url = 'http://localhost:8080/api/public/login';
            const body = {
                nombre: nombre,
                clave: clave
            };

            const resp = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            });

            return resp;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            errorMsg.style.display = 'none';

            const userInput = document.getElementById('username').value.trim();
            const passInput = document.getElementById('password').value.trim();

            if (!userInput || !passInput) {
                errorMsg.textContent = 'Completa usuario y contraseña.';
                errorMsg.style.display = 'block';
                return;
            }

            // Enviamos los valores en mayúsculas para coincidir con el ejemplo pedido
            const payloadNombre = userInput.toUpperCase();
            const payloadClave = passInput.toUpperCase();

            // Desactivar botón para evitar múltiples envíos
            submitButton.disabled = true;

            try {
                const response = await sendLoginRequest(payloadNombre, payloadClave);
                console.log('Respuesta del servidor:', response);

                if (!response.ok) {
                    errorMsg.textContent = 'Error de red: ' + response.status;
                    errorMsg.style.display = 'block';
                    submitButton.disabled = false;
                    return;
                }

                const data = await response.json();

                if (data && data.error === false && data.reply && data.reply.token) {
                    const token = data.reply.token;
                    // Guardar token
                    sessionStorage.setItem('token', token);

                    const payload = parseJwt(token);
                    const roleRaw = (payload && (payload.rol || payload.role || payload.Rol || payload.ROL)) || '';
                    const role = String(roleRaw).toUpperCase();

                    // Redireccionar según rol
                    if (role.includes('ADMIN')) {
                        window.location.href = 'admin.html';
                    } else if (role.includes('EMPLOY') || role.includes('EMPLOYEE') || role.includes('EMPLE')) {
                        window.location.href = 'empleado.html';
                    } else {
                        // Rol desconocido: ir a una ruta por defecto (empleado)
                        window.location.href = 'empleado.html';
                    }

                } else {
                    errorMsg.textContent = 'Usuario o contraseña incorrectos.';
                    errorMsg.style.display = 'block';
                    submitButton.disabled = false;
                }

            } catch (err) {
                errorMsg.textContent = 'No se pudo conectar al servidor.';
                errorMsg.style.display = 'block';
                submitButton.disabled = false;
            }
        });
    </script>

</body>
</html>
